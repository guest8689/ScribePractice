<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Scribe Practice App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

.container {
    width: 95%;
    max-width: 600px;
}

canvas {
    display: block;
    width: 100%;
    background: #000000;
    touch-action: none; 
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}
</style>
</head>

<body>

<div class="container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let lastX = 0;
let lastY = 0;

let ui = {
    padding: 16,
    textY: 30,
    board: { x: 0, y: 45, w: 0, h: 130 },
    btn: { x: 0, y: 0, w: 65, h: 30, radius: 15 }
};

function resizeCanvas() {
    const containerWidth = canvas.parentElement.clientWidth;
    canvas.width = containerWidth;
    canvas.height = 45 + 130 + 16;

    ui.board.w = canvas.width;
    ui.btn.x = ui.board.w - ui.btn.w - 8;
    ui.btn.y = ui.board.y + ui.board.h - ui.btn.h - 8;

    drawEverything();
}

function drawEverything() {
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = "16px Arial, Helvetica, sans-serif";
    ctx.fillStyle = "#a1a1aa";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText("Nhập từ (Viết tay)", 0, ui.textY);

    ctx.fillStyle = "#09090b";
    ctx.fillRect(ui.board.x, ui.board.y, ui.board.w, ui.board.h);
    ctx.strokeStyle = "#3f3f46";
    ctx.lineWidth = 1;
    ctx.strokeRect(ui.board.x, ui.board.y, ui.board.w, ui.board.h);

    drawButton();
}

// Tách hàm vẽ nút bấm ra riêng để gọi đè liên tục khi vẽ
function drawButton() {
    ctx.save(); // Lưu trạng thái canvas
    ctx.fillStyle = "#3b82f6";
    ctx.beginPath();
    ctx.roundRect(ui.btn.x, ui.btn.y, ui.btn.w, ui.btn.h, ui.btn.radius);
    ctx.fill();

    ctx.font = "bold 13px Arial, Helvetica, sans-serif";
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Gửi", ui.btn.x + (ui.btn.w / 2), ui.btn.y + (ui.btn.h / 2));
    ctx.restore(); // Khôi phục trạng thái
}

function isClickingButton(x, y) {
    return x >= ui.btn.x && x <= ui.btn.x + ui.btn.w &&
           y >= ui.btn.y && y <= ui.btn.y + ui.btn.h;
}

function isInsideBoard(x, y) {
    return x >= ui.board.x && x <= ui.board.x + ui.board.w &&
           y >= ui.board.y && y <= ui.board.y + ui.board.h;
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;

    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }

    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

function start(e) {
    if (e.cancelable) e.preventDefault(); 
    const p = getPos(e);

    if (isClickingButton(p.x, p.y)) {
        drawEverything();
        if (navigator.vibrate) {
            navigator.vibrate(20);
        }
        return;
    }

    if (isInsideBoard(p.x, p.y)) {
        drawing = true;
        lastX = p.x;
        lastY = p.y;

        ctx.lineWidth = 3.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#ffffff";

        ctx.beginPath();
        ctx.fillStyle = "#ffffff";
        ctx.arc(p.x, p.y, ctx.lineWidth / 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

function move(e) {
    if (!drawing) return;
    if (e.cancelable) e.preventDefault(); 
    
    const p = getPos(e);

    // FIX LỖI 2: Nếu chuột đang ở TRONG ô vẽ thì mới tiến hành vẽ nét
    if (isInsideBoard(p.x, p.y)) {
        ctx.lineWidth = 3.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#ffffff";
        
        ctx.beginPath();
        // FIX LỖI 1: Thay vì lineTo, dùng quadraticCurveTo (đường cong Bezier) giúp quẹt nhanh không bị đứt góc phẳng
        const midX = (lastX + p.x) / 2;
        const midY = (lastY + p.y) / 2;
        ctx.moveTo(lastX, lastY);
        ctx.quadraticCurveTo(lastX, lastY, midX, midY);
        ctx.stroke();

        lastX = p.x;
        lastY = p.y;
        
        // Luôn vẽ đè nút Gửi lên trên cùng
        drawButton();
    } else {
        // Nếu lỡ bay ra ngoài khung: KHÔNG tắt drawing, chỉ cập nhật lại tọa độ chặn cuối 
        // để khi di chuột quay lại nó bắt đầu vẽ tiếp mượt mà từ rìa.
        lastX = p.x;
        lastY = p.y;
    }
}

function end() {
    drawing = false;
}

// Lắng nghe sự kiện click/chạm trên canvas
canvas.addEventListener("mousedown", start);
canvas.addEventListener("touchstart", start, { passive: false });

// QUAN TRỌNG: Lắng nghe move và end trên TOÀN WINDOW để xử lý việc di chuột ra ngoài canvas
window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move, { passive: false });
window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
            .then(() => console.log("Service Worker hoạt động"))
            .catch(err => console.error("Lỗi SW:", err));
    });
}
</script>

</body>
</html>
